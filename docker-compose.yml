# payMe stack: existing Postgres + Morphic services (Redis, SearXNG)
# Next.js runs locally via npm run dev

name: payme

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: payme
      POSTGRES_PASSWORD: payme
      POSTGRES_DB: payme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payme']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  searxng:
    image: searxng/searxng
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./searxng-limiter.toml:/etc/searxng/limiter.toml
      - ./searxng-settings.yml:/etc/searxng/settings.yml
      - searxng_data:/data

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - '3001:3000'
    volumes:
      - ./storage:/storage

volumes:
  pgdata:
  redis_data:
  searxng_data:
